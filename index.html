<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GlowCart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #2874f0;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

button {
  background: #2874f0;
  color: white;
  border: none;
  padding: 8px;
  margin-top: 5px;
  width: 100%;
  border-radius: 5px;
}

#cartBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: green;
}

#cartPage {
  display: none;
  padding: 10px;
}
</style>
</head>

<body>

<header>🛒 GlowCart</header>

<div id="homePage">
  <div class="container" id="productList"></div>
</div>

<div id="cartPage">
  <h2>Cart</h2>
  <div id="cartItems"></div>
  <h3 id="total"></h3>
  <button onclick="placeOrder()">Place Order (COD)</button>
  <button onclick="goHome()">⬅ Back</button>
</div>

<button id="cartBtn" onclick="showCart()">Cart 🛒</button>

<script>
// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCole_pSUeJV9Fij8UBKALiZXlhPLsMdZ8",
  authDomain: "glowcart-dac7d.firebaseapp.com",
  databaseURL: "https://glowcart-dac7d-default-rtdb.firebaseio.com/",
  projectId: "glowcart-dac7d",
  storageBucket: "glowcart-dac7d.firebasestorage.app",
  messagingSenderId: "609791967645",
  appId: "1:609791967645:web:56538a5969670675d1ef74"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 📦 Load Products from Firebase
function loadProducts(){
  db.ref("products").on("value", snapshot => {
    let data = snapshot.val();
    let html = "";

    for(let key in data){
      let p = data[key];

      html += `
      <div class="card">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
        <button onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>
      </div>`;
    }

    document.getElementById("productList").innerHTML = html;
  });
}

// 🛒 Add to Cart
function addToCart(product){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

// 🛍️ Show Cart
function showCart(){
  document.getElementById("homePage").style.display = "none";
  document.getElementById("cartPage").style.display = "block";

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let html = "";
  let total = 0;

  cart.forEach(item => {
    total += parseInt(item.price);
    html += `<p>${item.name} - ₹${item.price}</p>`;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = "Total: ₹" + total;
}

// 📦 Place Order
function placeOrder(){
  localStorage.removeItem("cart");
  alert("Order Placed Successfully!");
  location.reload();
}

// ⬅ Back to Home
function goHome(){
  document.getElementById("homePage").style.display = "block";
  document.getElementById("cartPage").style.display = "none";
}

// Init
loadProducts();
</script>

</body>
</html>
